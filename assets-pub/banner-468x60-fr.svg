<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 468 60" width="468" height="60">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A12"/>
      <stop offset="50%" style="stop-color:#12101E"/>
      <stop offset="100%" style="stop-color:#0A0A12"/>
    </linearGradient>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B2FA0"/>
      <stop offset="50%" style="stop-color:#8B3FD0"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0A0A12"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B2FA0;stop-opacity:0"/>
      <stop offset="25%" style="stop-color:#9B5FD0"/>
      <stop offset="75%" style="stop-color:#00E5FF"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#C8A0FF"/>
      <stop offset="100%" style="stop-color:#00E5FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="10%" cy="50%" r="15%">
      <stop offset="0%" style="stop-color:#6B2FA0;stop-opacity:0.35"/>
      <stop offset="100%" style="stop-color:#6B2FA0;stop-opacity:0"/>
    </radialGradient>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
    </filter>
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="468" height="60" fill="url(#bgGrad)"/>
  <rect width="468" height="60" fill="url(#glow)"/>

  <!-- Accent lines -->
  <line x1="0" y1="0.5" x2="468" y2="0.5" stroke="url(#accentLine)" stroke-width="1"/>
  <line x1="0" y1="59.5" x2="468" y2="59.5" stroke="url(#accentLine)" stroke-width="1"/>

  <!-- Mini shield -->
  <g transform="translate(14, 5) scale(0.11)">
    <path d="M250 45 L410 120 L410 280 Q410 380 250 460 Q90 380 90 280 L90 120 Z"
          fill="url(#mainGrad)" filter="url(#outerGlow)" opacity="0.5"/>
    <path d="M250 55 L400 125 L400 275 Q400 370 250 445 Q100 370 100 275 L100 125 Z"
          fill="url(#mainGrad)"/>
    <path d="M250 70 L387 135 L387 270 Q387 358 250 430 Q113 358 113 270 L113 135 Z"
          fill="url(#shieldInner)"/>
    <rect x="190" y="170" width="28" height="155" rx="4" fill="url(#mainGrad)"/>
    <rect x="190" y="170" width="120" height="24" rx="4" fill="url(#mainGrad)"/>
    <rect x="190" y="232" width="100" height="22" rx="4" fill="url(#mainGrad)"/>
    <rect x="190" y="301" width="120" height="24" rx="4" fill="url(#mainGrad)"/>
    <rect x="295" y="235" width="14" height="14" rx="2" transform="rotate(45 302 242)" fill="#00E5FF" opacity="0.9"/>
  </g>

  <!-- Title -->
  <text x="75" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800"
        letter-spacing="2" fill="url(#mainGrad)">ERINIUM</text>
  <text x="177" y="26" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="300"
        letter-spacing="3" fill="#E8E8F0" opacity="0.9">FACTION</text>

  <!-- Subtitle -->
  <text x="75" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="400"
        letter-spacing="1.2" fill="#8892A4">MODD&#xC9; 1.12.2</text>
  <circle cx="152" cy="37" r="1" fill="#00E5FF" opacity="0.6"/>
  <text x="160" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="400"
        letter-spacing="1.2" fill="#8892A4">FACTION &amp; PVP</text>
  <circle cx="242" cy="37" r="1" fill="#00E5FF" opacity="0.6"/>
  <text x="250" y="40" font-family="'Segoe UI', Arial, sans-serif" font-size="8" font-weight="400"
        letter-spacing="1.2" fill="#8892A4">RPG</text>

  <!-- Tags -->
  <rect x="75" y="44" width="68" height="12" rx="6" fill="#6B2FA0" opacity="0.2"/>
  <text x="109" y="53" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7"
        font-weight="600" fill="#C8A0FF">Enchantements</text>
  <rect x="148" y="44" width="55" height="12" rx="6" fill="#6B2FA0" opacity="0.2"/>
  <text x="175" y="53" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7"
        font-weight="600" fill="#C8A0FF">36 Biomes</text>
  <rect x="208" y="44" width="55" height="12" rx="6" fill="#00E5FF" opacity="0.12"/>
  <text x="235" y="53" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7"
        font-weight="600" fill="#00E5FF">Artefacts</text>

  <!-- Separator -->
  <line x1="330" y1="10" x2="330" y2="50" stroke="#6B2FA0" stroke-width="0.5" opacity="0.3"/>

  <!-- Coming Soon -->
  <text x="398" y="22" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7"
        font-weight="600" letter-spacing="2.5" fill="#8892A4" opacity="0.7">SORTIE</text>
  <g filter="url(#textGlow)">
    <text x="398" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
          font-weight="800" letter-spacing="1" fill="url(#textGrad)">JUILLET 2026</text>
  </g>
  <text x="398" y="40" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        font-weight="800" letter-spacing="1" fill="url(#textGrad)">JUILLET 2026</text>
  <text x="398" y="52" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7"
        font-weight="400" letter-spacing="0.8" fill="#00E5FF" opacity="0.5">discord.gg/fcJmskudey</text>

  <!-- Sparkles -->
  <circle cx="70" cy="12" r="0.8" fill="#00E5FF" opacity="0.5"/>
  <circle cx="455" cy="10" r="1" fill="#6B2FA0" opacity="0.5"/>
</svg>
